<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PotatoDoc - Title Slide</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #FFFFFF;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            font-family: 'Inter', sans-serif;
            position: relative;
        }
        
        .header-section {
            width: 100%;
            padding-top: 60px;
            text-align: center;
        }
        
        .university-name {
            font-size: 24px;
            font-weight: 600;
            color: #006064;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .university-tagline {
            font-size: 14px;
            color: #424242;
            font-weight: 400;
        }
        
        .accent-line {
            width: 80px;
            height: 3px;
            background: #00BCD4;
            margin: 30px auto;
        }
        
        .content-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            width: 100%;
            padding: 0 60px;
        }
        
        .project-title {
            font-size: 64px;
            font-weight: 700;
            color: #006064;
            margin-bottom: 20px;
            line-height: 1.2;
        }
        
        .project-subtitle {
            font-size: 32px;
            font-weight: 400;
            color: #424242;
            margin-bottom: 40px;
        }
        
        .footer-section {
            width: 100%;
            padding-bottom: 40px;
            text-align: center;
        }
        
        .footer-info {
            font-size: 16px;
            color: #424242;
            margin-bottom: 8px;
            font-weight: 400;
        }
        
        .footer-info strong {
            color: #006064;
            font-weight: 600;
        }
        
        .page-number {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-size: 14px;
            color: #424242;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="header-section">
            <div class="university-name">GANDAKI UNIVERSITY</div>
            <div class="university-tagline">गण्डकी विश्वविद्यालय</div>
            <div class="accent-line"></div>
        </div>
        
        <div class="content-section">
            <div class="project-title">PotatoDoc</div>
            <div class="project-subtitle">AI-Powered Potato Disease Detection System</div>
            <div style="font-size: 18px; color: #00BCD4; font-weight: 500; margin-top: 20px;">A Deep Learning Solution for Farmers</div>
        </div>
        
        <div class="footer-section">
            <div class="footer-info"><strong>Date:</strong> February 28, 2026</div>
            <div class="footer-info"><strong>Program:</strong> [Your Program/Department]</div>
            <div class="footer-info" style="margin-top: 15px;"><strong>Presented by:</strong> [Your Name]</div>
        </div>
        
        <div class="page-number">1</div>
    </div>
</body>
</html>
